<style>
/* ============ TOKENS ============ */
:root{
  --bg:#0f1714; --bg2:#152019; --card:#18241d; --card2:#1f2e25;
  --line:#26352b; --line2:#314539;
  --ink:#e8efe9; --ink2:#9fb3a6; --ink3:#6f8475;
  --acc:#3ddc8f; --acc-d:#1f7d54; --acc-ink:#06150d;
  --warn:#f5c451; --warn-d:#8a6a18;
  --bad:#ff6b6b; --bad-d:#8e2f2f;
  --info:#67b8ff;
  --radius:16px; --radius-s:11px;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --shadow:0 8px 28px -12px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#eef2ee; --bg2:#e4eae5; --card:#ffffff; --card2:#f5f8f5;
  --line:#dde6df; --line2:#cdd9d0;
  --ink:#15211a; --ink2:#4f6356; --ink3:#7e9387;
  --acc:#149a5e; --acc-d:#0c7a49; --acc-ink:#ffffff;
  --warn:#b87d05; --warn-d:#e7c873;
  --bad:#d23b3b; --bad-d:#f0bcbc;
  --info:#2476c9;
  --shadow:0 8px 24px -14px rgba(20,40,30,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.45; overscroll-behavior-y:none;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
}
@media(min-width:860px){ body{padding-bottom:0} }
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
svg{width:20px;height:20px;flex:0 0 auto}
.btn svg{width:17px;height:17px}
.badge svg{width:12px;height:12px}
.report-row > svg{width:18px;height:18px;opacity:.5;transform:rotate(180deg)}
.report-row .ri svg{width:18px;height:18px}
input,select,textarea{font-family:inherit;font-size:15px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.hide{display:none!important}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}

/* ============ LOGIN ============ */
#login{position:fixed;inset:0;z-index:100;background:radial-gradient(120% 90% at 50% 0%,var(--bg2),var(--bg));display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:360px;text-align:center}
.brandmark{width:74px;height:74px;border-radius:22px;margin:0 auto 18px;background:linear-gradient(150deg,var(--acc),var(--acc-d));display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px -14px var(--acc-d)}
.brandmark svg{width:38px;height:38px}
.login-card h1{font-size:26px;margin:0 0 4px;letter-spacing:-.03em;font-weight:800}
.login-card p{color:var(--ink2);margin:0 0 26px;font-size:13.5px}
.field{text-align:left;margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--ink2);margin:0 0 6px;font-weight:600;letter-spacing:.02em}
.input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-s);padding:13px 14px;color:var(--ink);outline:none;transition:.15s}
.input:focus{border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 22%,transparent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--acc);color:var(--acc-ink);font-weight:700;border-radius:var(--radius-s);padding:13px 16px;width:100%;transition:.15s;font-size:15px}
.btn:active{transform:scale(.985)}
.btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--ink2)}
.btn.danger{background:color-mix(in srgb,var(--bad) 16%,transparent);color:var(--bad);border:1px solid color-mix(in srgb,var(--bad) 30%,transparent)}
.btn.sm{padding:9px 12px;font-size:13px;width:auto;border-radius:9px}
.login-err{color:var(--bad);font-size:13px;margin-top:10px;min-height:18px}
.login-hint{margin-top:18px;font-size:12px;color:var(--ink3)}

/* ============ APP SHELL ============ */
#app{max-width:980px;margin:0 auto}
.topbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px}
.topbar .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,var(--acc),var(--acc-d));display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.topbar .mk svg{width:19px;height:19px}
.topbar h2{font-size:16px;margin:0;font-weight:800;letter-spacing:-.02em;flex:1}
.topbar h2 small{display:block;font-size:11px;color:var(--ink3);font-weight:500;letter-spacing:0}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.icon-btn svg{width:19px;height:19px}
.page{padding:16px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.page-head h3{font-size:20px;margin:0;letter-spacing:-.02em;font-weight:800}
.section-label{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin:22px 2px 10px}

/* ============ BOTTOM NAV ============ */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:45;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;color:var(--ink3);font-size:10.5px;font-weight:600;border-radius:10px;transition:.15s}
.nav button svg{width:21px;height:21px}
.nav button.on{color:var(--acc)}
@media(min-width:860px){
  .nav{position:sticky;top:0;flex-direction:column;width:200px;height:100vh;border-top:none;border-right:1px solid var(--line);justify-content:flex-start;padding:80px 12px;gap:4px;background:var(--bg2)}
  .nav button{flex-direction:row;justify-content:flex-start;gap:12px;padding:11px 14px;font-size:14px}
  .nav button svg{width:19px;height:19px}
  .nav button.on{background:var(--card);box-shadow:var(--shadow)}
  .desktop-wrap{display:flex}
  #app{max-width:none;width:100%}
  .desktop-main{flex:1;max-width:980px;margin:0 auto}
}

/* ============ CARDS / KPI ============ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:560px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.kpi .lbl{font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.01em;display:flex;align-items:center;gap:5px;margin-bottom:7px}
.kpi .val{font-size:20px;font-weight:800;letter-spacing:-.03em}
.kpi.acc .val{color:var(--acc)} .kpi.warn .val{color:var(--warn)} .kpi.bad .val{color:var(--bad)}
.kpi .val.sm{font-size:17px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.panel h4{margin:0 0 14px;font-size:14px;font-weight:700;letter-spacing:-.01em}

/* chart */
.bars{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:8px}
.bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bars .bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--acc),var(--acc-d));border-radius:6px 6px 3px 3px;min-height:3px;transition:.4s;position:relative}
.bars .bar.j{background:linear-gradient(180deg,var(--warn),var(--warn-d))}
.bars .bar-lbl{font-size:10px;color:var(--ink3);font-weight:600}
.bars .bar-val{font-size:9.5px;color:var(--ink2);font-family:var(--mono)}
.legend{display:flex;gap:16px;margin-top:12px;font-size:11.5px;color:var(--ink2)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ============ LISTS ============ */
.searchbar{display:flex;gap:8px;margin-bottom:12px}
.searchbar .input{flex:1}
.list{display:flex;flex-direction:column;gap:9px}
.row{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:12px;transition:.15s}
.row:active{background:var(--card2)}
.avatar{width:42px;height:42px;border-radius:13px;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--acc);flex:0 0 auto;overflow:hidden;background-size:cover;background-position:center}
.row .meta{flex:1;min-width:0}
.row .meta .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta .sub{font-size:12px;color:var(--ink2);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.row .right{text-align:right;flex:0 0 auto}
.row .right .amt{font-weight:800;font-size:15px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.01em}
.badge.ok{background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--acc)}
.badge.warn{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn)}
.badge.bad{background:color-mix(in srgb,var(--bad) 15%,transparent);color:var(--bad)}
.badge.mut{background:var(--card2);color:var(--ink2)}
.empty{text-align:center;padding:46px 20px;color:var(--ink3)}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}
.empty .t{font-weight:600;color:var(--ink2);margin-bottom:4px}
.empty .s{font-size:13px}

/* chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:7px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink2);flex:0 0 auto}
.chip.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}

/* fab */
.fab{position:fixed;right:18px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:46;width:54px;height:54px;border-radius:18px;background:var(--acc);color:var(--acc-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -8px var(--acc-d)}
.fab svg{width:26px;height:26px}
@media(min-width:860px){.fab{bottom:24px}}

/* ============ MODAL / SHEET ============ */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@media(min-width:560px){.scrim{align-items:center;padding:20px}}
.sheet{background:var(--bg2);width:100%;max-width:520px;max-height:92vh;border-radius:22px 22px 0 0;overflow-y:auto;animation:up .28s cubic-bezier(.2,.9,.3,1);border:1px solid var(--line)}
@media(min-width:560px){.sheet{border-radius:22px}}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet-head{position:sticky;top:0;background:var(--bg2);padding:18px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);z-index:2}
.sheet-head h3{font-size:17px;margin:0;flex:1;font-weight:800;letter-spacing:-.02em}
.sheet-body{padding:18px}
.grab{width:38px;height:4px;background:var(--line2);border-radius:4px;margin:9px auto 0}

.form-grid{display:grid;gap:13px}
.form-grid.two{grid-template-columns:1fr 1fr}
textarea.input{resize:vertical;min-height:64px}
.help{font-size:11.5px;color:var(--ink3);margin-top:5px}
.opt-list{display:flex;flex-direction:column;gap:8px;margin:4px 0}
.opt{display:flex;gap:11px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);transition:.15s}
.opt.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,var(--card))}
.opt .rd{width:19px;height:19px;border-radius:50%;border:2px solid var(--line2);flex:0 0 auto;margin-top:1px;position:relative}
.opt.on .rd{border-color:var(--acc)}
.opt.on .rd::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--acc)}
.opt .ot{font-weight:700;font-size:14px}
.opt .od{font-size:12px;color:var(--ink2);margin-top:2px}

.calc-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin:4px 0}
.calc-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13.5px}
.calc-line .k{color:var(--ink2)}
.calc-line .v{font-weight:700;font-family:var(--mono)}
.calc-line.total{border-top:1px dashed var(--line2);margin-top:4px;padding-top:9px;font-size:15px}
.calc-line.total .v{color:var(--acc)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0}
.switch{width:46px;height:27px;border-radius:20px;background:var(--line2);position:relative;transition:.2s;flex:0 0 auto}
.switch.on{background:var(--acc)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s}
.switch.on::after{left:22px}

/* detail */
.det-head{text-align:center;padding:6px 0 14px}
.det-head .avatar{width:60px;height:60px;border-radius:18px;margin:0 auto 10px;font-size:24px}
.det-head .nm{font-size:19px;font-weight:800}
.det-head .ph{font-size:13px;color:var(--ink2);margin-top:2px}
.det-actions{display:flex;gap:8px;margin:14px 0}
.det-actions .btn{flex:1;font-size:13px;padding:11px}

.tl{position:relative;padding-left:20px}
.tl::before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item::before{content:"";position:absolute;left:-19px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--acc);border:2px solid var(--bg2)}
.tl-item.j::before{background:var(--warn)}
.tl-item.q::before{background:var(--info)}
.tl-item .th{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.tl-item .tt{font-weight:700;font-size:14px}
.tl-item .td{font-size:11.5px;color:var(--ink3);font-family:var(--mono)}
.tl-item .ts{font-size:12px;color:var(--ink2);margin-top:3px;line-height:1.5}
.tl-item .receipt{margin-top:7px;border-radius:9px;max-width:120px;border:1px solid var(--line);cursor:pointer}

.toast{position:fixed;bottom:calc(94px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:90;background:var(--ink);color:var(--bg);padding:12px 18px;border-radius:30px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);animation:tin .3s;max-width:90vw;text-align:center}
@keyframes tin{from{opacity:0;transform:transl(-50%,10px)}to{opacity:1}}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-h{text-align:center;font-size:10px;color:var(--ink3);font-weight:700;padding:4px 0}
.cal-d{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12.5px;background:var(--card);border:1px solid transparent;position:relative}
.cal-d.out{opacity:.3}
.cal-d.today{border-color:var(--acc);font-weight:800}
.cal-d .cdot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav .m{font-weight:800;font-size:15px}

.set-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);gap:12px}
.set-item:last-child{border-bottom:none}
.set-item .si-l{font-size:14px;font-weight:600}
.set-item .si-s{font-size:12px;color:var(--ink2);margin-top:2px}
.report-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.report-row:last-child{border-bottom:none}
.report-row .ri{width:38px;height:38px;border-radius:11px;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--acc)}
.report-row .rt{flex:1}
.report-row .rt b{font-size:14px;font-weight:700}
.report-row .rt small{display:block;font-size:12px;color:var(--ink2)}

/* relatório */
.rep-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.rep-tbl th{text-align:left;background:var(--acc);color:var(--acc-ink);padding:8px 7px;font-size:10.5px;font-weight:700}
.rep-tbl td{padding:7px;border-bottom:1px solid var(--line);color:var(--ink)}
.rep-tbl tr:nth-child(even) td{background:var(--card2)}
.rep-empty{text-align:center;color:var(--ink3);padding:24px}
.rep-tot{margin-top:12px;font-weight:800;font-size:15px;text-align:right;color:var(--acc)}

#print-area{display:none}
@media print{
  body{padding:0!important;background:#fff!important}
  body > *:not(#print-area){display:none!important}
  #print-area{display:block!important;padding:24px;color:#15211a;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  #print-area h1{font-size:20px;margin:0}
  #print-area .ps{color:#667;font-size:12px;margin:4px 0 16px}
  #print-area table{width:100%;border-collapse:collapse;font-size:11.5px}
  #print-area th{background:#149a5e;color:#fff;text-align:left;padding:7px}
  #print-area td{padding:6px 7px;border-bottom:1px solid #e3eae5}
  #print-area tr:nth-child(even) td{background:#f6faf7}
  #print-area .rep-tot{text-align:right;font-weight:700;font-size:14px;margin-top:12px}
  #print-area .pf{margin-top:16px;font-size:10px;color:#889;border-top:1px solid #ddd;padding-top:8px}
}
</style>
</head>
<body data-theme="dark">

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brandmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#06150d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v14H4z"/><path d="M4 9h16"/><path d="M8 14h4"/></svg>
    </div>
    <h1>Controle+</h1>
    <p>Controle de crédito particular</p>
    <div class="field"><label>Usuário</label><input class="input" id="lg-user" placeholder="Seu usuário" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input class="input" id="lg-pass" type="password" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="lg-err"></div>
    <div class="login-hint" id="lg-hint"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hide">
  <div class="desktop-wrap">
    <!-- NAV (desktop = sidebar) -->
    <nav class="nav" id="nav"></nav>

    <div class="desktop-main">
      <header class="topbar">
        <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#06150d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v14H4z"/><path d="M4 9h16"/><path d="M8 14h4"/></svg></div>
        <h2 id="tb-title">Painel<small id="tb-sub">Visão geral</small></h2>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Tema">${ico('moon')}</button>
      </header>
      <main id="view"></main>
    </div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>
<div id="print-area"></div>

<script>
/* ============================================================
   ÍCONES
   ============================================================ */
function ico(n){const i={
 grid:'<path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>',
 cash:'<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/>',
 users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>',
 cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
 dots:'<circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>',
 moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',
 sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
 plus:'<path d="M12 5v14M5 12h14"/>',
 search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
 wpp:'<path d="M21 11.5a8.4 8.4 0 0 1-12.6 7.3L3 21l2.3-5.3A8.5 8.5 0 1 1 21 11.5z"/>',
 edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
 trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
 close:'<path d="M18 6 6 18M6 6l12 12"/>',
 pay:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
 chart:'<path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/>',
 doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
 sheet:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>',
 bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
 gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.2 2 2 0 0 1-4 0 1.6 1.6 0 0 0-2.7-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>',
 logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>',
 back:'<path d="M19 12H5M12 19l-7-7 7-7"/>',
 db:'<path d="M12 2a9 3 0 0 0-9 3v14a9 3 0 0 0 18 0V5a9 3 0 0 0-9-3z" fill="none"/><path d="M3 5a9 3 0 0 0 18 0M3 12a9 3 0 0 0 18 0"/>',
 shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
 history:'<path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/>',
 cam:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>'
 };return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(i[n]||'')+'</svg>';}

/* ============================================================
   ESTADO / PERSISTÊNCIA
   ============================================================ */
const KEY='caderneta_v1';
const DEFAULT={
  users:[{u:'admin',p:hash('admin'),nome:'Administrador',role:'admin'}],
  clients:[], loans:[], audit:[],
  config:{ juros:20, alertaDias:5, credor:'', logo:'', pix:'', pixNome:'',
    msgConcessao:'Olá {cliente}! Confirmo o empréstimo de {valor} em {data_emp}. Vencimento: {data_venc}. Juros do mês: {juros}. Para quitar: {total}.\n\nChave PIX para pagamento: {pix}\nQualquer dúvida, estou à disposição.',
    msgLembrete:'Olá {cliente}! Lembrete: seu vencimento é em {data_venc}. Valor dos juros: {juros}. Saldo devedor: {saldo}. Para quitar: {total}.\n\nChave PIX: {pix}',
    msgAtraso:'Olá {cliente}! Consta atraso desde {data_venc} ({dias_atraso} dias). Saldo devedor: {saldo} + juros {juros}.\n\nPara regularizar, PIX: {pix}\nPor favor, entre em contato.',
    msgRecibo:'Olá {cliente}! Confirmo o recebimento de {valor_pago} em {data_pgto}.\nJuros pagos: {juros_pago}\nAbatido do saldo: {principal_pago}\nNovo saldo devedor: {novo_saldo}\nPróximo vencimento: {data_venc}\n\nObrigada!'
  },
  session:null
};
let DB=load();
(function migrate(){if(DB.config.pix===undefined)DB.config.pix='';if(DB.config.pixNome===undefined)DB.config.pixNome='';
  if(DB.config.msgRecibo===undefined)DB.config.msgRecibo='Olá {cliente}! Confirmo o recebimento de {valor_pago} em {data_pgto}.\nJuros pagos: {juros_pago}\nAbatido do saldo: {principal_pago}\nNovo saldo devedor: {novo_saldo}\nPróximo vencimento: {data_venc}\n\nObrigada!';})();
let CURRENT=null; // usuário logado

function load(){try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.users)return r;}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return 'h'+(h>>>0);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ============================================================
   HELPERS
   ============================================================ */
const $=s=>document.querySelector(s);
function money(n){return (n<0?'-':'')+'R$ '+Math.abs(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function moneyShort(n){const a=Math.abs(n||0);if(a>=1000)return 'R$ '+(n/1000).toFixed(1).replace('.',',')+'k';return money(n);}
function dBR(iso){if(!iso)return '—';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function addMonth(iso,n=1){const[y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1+n,1);const last=new Date(y,m+n,0).getDate();dt.setDate(Math.min(d,last));return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function initials(nm){return nm.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function audit(acao,detalhe){DB.audit.unshift({id:uid(),ts:Date.now(),user:CURRENT?CURRENT.u:'?',acao,detalhe});if(DB.audit.length>2000)DB.audit.pop();}
function toast(msg){const r=$('#toast-root');r.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>r.innerHTML='',2200);}

/* status helpers */
function loanInterest(l){return Math.round(l.saldo*(l.juros/100)*100)/100;}
function loanTotal(l){return l.saldo+loanInterest(l);}
function loanStatus(l){
  if(l.status==='quitado')return {k:'quitado',cls:'mut',txt:'Quitado'};
  const dd=daysBetween(todayISO(),l.dataVencimento);
  if(dd<0){const atras=-dd;return {k:'vencido',cls:'bad',txt:atras>30?`Atraso ${atras}d`:'Vencido',atraso:atras};}
  if(dd===0)return {k:'hoje',cls:'warn',txt:'Vence hoje'};
  if(dd===1)return {k:'amanha',cls:'warn',txt:'Vence amanhã'};
  if(dd<=DB.config.alertaDias)return {k:'proximo',cls:'warn',txt:`Vence em ${dd}d`};
  return {k:'emdia',cls:'ok',txt:`Em dia · ${dd}d`};
}
function clientById(id){return DB.clients.find(c=>c.id===id);}
function loansOfClient(id){return DB.loans.filter(l=>l.clientId===id);}
function clientStatus(c){
  const ls=loansOfClient(c.id).filter(l=>l.status!=='quitado');
  if(ls.length===0)return loansOfClient(c.id).length?{cls:'mut',txt:'Quitado'}:{cls:'mut',txt:'Sem empréstimo'};
  if(ls.some(l=>loanStatus(l).k==='vencido'))return {cls:'bad',txt:'Inadimplente'};
  return {cls:'ok',txt:'Ativo'};
}

/* ============================================================
   LOGIN
   ============================================================ */
function bootLogin(){
  const hasUser=DB.users.length>0;
  $('#lg-hint').textContent = (DB.users.length===1 && DB.users[0].u==='admin') ? 'Primeiro acesso: usuário admin · senha admin' : '';
  if(DB.session){const u=DB.users.find(x=>x.u===DB.session);if(u){CURRENT=u;enterApp();return;}}
}
function doLogin(){
  const u=$('#lg-user').value.trim(), p=$('#lg-pass').value;
  const found=DB.users.find(x=>x.u.toLowerCase()===u.toLowerCase());
  if(!found||found.p!==hash(p)){$('#lg-err').textContent='Usuário ou senha inválidos.';return;}
  CURRENT=found;DB.session=found.u;save();audit('login','');enterApp();
}
function logout(){DB.session=null;save();CURRENT=null;location.reload();}
function enterApp(){
  $('#nav').innerHTML=[['dash','grid','Painel'],['loans','cash','Empréstimos'],['clients','users','Clientes'],['agenda','cal','Agenda'],['more','dots','Mais']]
    .map(([t,i,l])=>`<button data-tab="${t}" onclick="go('${t}')">${ico(i)}<span>${l}</span></button>`).join('');
  $('#login').classList.add('hide');$('#app').classList.remove('hide');go('dash');
}
$('#lg-pass')&&$('#lg-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ============================================================
   ROUTER
   ============================================================ */
let TAB='dash';
const TITLES={dash:['Painel','Visão geral'],loans:['Empréstimos','Carteira'],clients:['Clientes','Cadastro e histórico'],agenda:['Agenda','Vencimentos'],more:['Mais','Relatórios e ajustes']};
function go(tab){
  TAB=tab;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  $('#tb-title').firstChild.textContent=TITLES[tab][0];
  $('#tb-sub').textContent=TITLES[tab][1];
  ({dash:renderDash,loans:renderLoans,clients:renderClients,agenda:renderAgenda,more:renderMore}[tab])();
  window.scrollTo(0,0);
}

/* ============================================================
   PAINEL
   ============================================================ */
function renderDash(){
  const ls=DB.loans, ativos=ls.filter(l=>l.status!=='quitado');
  const totalEmprestado=ls.reduce((s,l)=>s+l.valorOriginal,0);
  const saldoReceber=ativos.reduce((s,l)=>s+loanTotal(l),0);
  const mesAtual=todayISO().slice(0,7);
  let recMes=0,jurMesTot=0,jurTotal=0;
  ls.forEach(l=>(l.historico||[]).forEach(h=>{
    if(h.data.slice(0,7)===mesAtual)recMes+=h.valor;
    if(h.jurosPago){if(h.data.slice(0,7)===mesAtual)jurMesTot+=h.jurosPago;jurTotal+=h.jurosPago;}
  }));
  const inadimplentes=DB.clients.filter(c=>clientStatus(c).txt==='Inadimplente').length;
  const quitados=ls.filter(l=>l.status==='quitado').length;
  const jurosAReceber=ativos.reduce((s,l)=>s+loanInterest(l),0); // juros correndo sobre saldos em aberto

  // série últimos 6 meses
  const meses=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);meses.push(d.toISOString().slice(0,7));}
  const serieRec=meses.map(m=>{let r=0;ls.forEach(l=>(l.historico||[]).forEach(h=>{if(h.data.slice(0,7)===m)r+=h.valor;}));return r;});
  const serieJur=meses.map(m=>{let r=0;ls.forEach(l=>(l.historico||[]).forEach(h=>{if(h.data.slice(0,7)===m&&h.jurosPago)r+=h.jurosPago;}));return r;});
  const maxV=Math.max(1,...serieRec);
  const mn=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const barsHTML=meses.map((m,i)=>{
    const mi=Number(m.slice(5,7))-1;
    const hR=(serieRec[i]/maxV)*100, hJ=(serieJur[i]/maxV)*100;
    return `<div class="bar-col">
      <div class="bar-val">${serieRec[i]?moneyShort(serieRec[i]).replace('R$ ',''):''}</div>
      <div class="bar" style="height:${Math.max(hR,serieRec[i]?6:0)}%"></div>
      <div class="bar j" style="height:${Math.max(hJ,serieJur[i]?4:0)}%"></div>
      <div class="bar-lbl">${mn[mi]}</div></div>`;
  }).join('');

  // próximos vencimentos
  const prox=ativos.map(l=>({l,st:loanStatus(l)})).filter(x=>['vencido','hoje','amanha','proximo'].includes(x.st.k))
    .sort((a,b)=>new Date(a.l.dataVencimento)-new Date(b.l.dataVencimento)).slice(0,5);

  $('#view').innerHTML=`<div class="page">
    <div class="kpi-grid">
      <div class="kpi acc"><div class="lbl">${ico2('cash')} A receber</div><div class="val">${money(saldoReceber)}</div></div>
      <div class="kpi"><div class="lbl">${ico2('pay')} Recebido no mês</div><div class="val sm">${money(recMes)}</div></div>
      <div class="kpi"><div class="lbl">${ico2('chart')} Juros no mês</div><div class="val sm">${money(jurMesTot)}</div></div>
      <div class="kpi ${inadimplentes?'bad':''}"><div class="lbl">${ico2('shield')} Inadimplentes</div><div class="val">${inadimplentes}</div></div>
    </div>

    <div class="section-label">Ganhos com juros</div>
    <div class="panel" style="background:linear-gradient(150deg,color-mix(in srgb,var(--acc) 14%,var(--card)),var(--card));border-color:color-mix(in srgb,var(--acc) 30%,transparent);margin-bottom:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <div class="lbl" style="font-size:11px;color:var(--ink2);font-weight:600;margin-bottom:6px">${ico2('pay')} Já recebido</div>
          <div class="num" style="font-size:24px;font-weight:800;color:var(--acc);letter-spacing:-.03em">${money(jurTotal)}</div>
          <div class="help">No mês: ${money(jurMesTot)}</div>
        </div>
        <div style="border-left:1px solid var(--line);padding-left:14px">
          <div class="lbl" style="font-size:11px;color:var(--ink2);font-weight:600;margin-bottom:6px">${ico2('chart')} A receber (em aberto)</div>
          <div class="num" style="font-size:24px;font-weight:800;color:var(--warn);letter-spacing:-.03em">${money(jurosAReceber)}</div>
          <div class="help">Juros do mês sobre os saldos atuais</div>
        </div>
      </div>
      <div style="border-top:1px dashed var(--line2);margin-top:13px;padding-top:11px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12.5px;color:var(--ink2);font-weight:600">Ganho potencial total</span>
        <span class="num" style="font-size:17px;font-weight:800">${money(jurTotal+jurosAReceber)}</span>
      </div>
    </div>

    <div class="section-label">Movimento dos últimos 6 meses</div>
    <div class="panel">
      <div class="bars">${barsHTML}</div>
      <div class="legend">
        <span><i style="background:var(--acc)"></i> Recebimentos</span>
        <span><i style="background:var(--warn)"></i> Juros recebidos</span>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="lbl">Total emprestado</div><div class="val sm">${money(totalEmprestado)}</div></div>
      <div class="kpi"><div class="lbl">Clientes</div><div class="val">${DB.clients.length}</div></div>
      <div class="kpi"><div class="lbl">Empréstimos ativos</div><div class="val">${ativos.length}</div></div>
      <div class="kpi"><div class="lbl">Quitados</div><div class="val">${quitados}</div></div>
    </div>

    <div class="section-label">Atenção · próximos e vencidos</div>

let loanFilter='todos', loanSearch='';
function renderLoans(){
  const chips=[['todos','Todos'],['ativos','Ativos'],['vencido','Vencidos'],['proximo','A vencer'],['quitado','Quitados']];
  $('#view').innerHTML=`<div class="page">
    <div class="searchbar">
      <input class="input" id="loan-q" placeholder="Buscar por cliente, valor…" value="${loanSearch}" oninput="loanSearch=this.value;listLoans()">
    </div>
    <div class="chips" id="loan-chips">${chips.map(c=>`<div class="chip ${loanFilter===c[0]?'on':''}" onclick="loanFilter='${c[0]}';renderLoans()">${c[1]}</div>`).join('')}</div>
    <div id="loan-list"></div>
  </div>`;
  listLoans();mountFab(()=>openLoanForm());
}
function listLoans(){
  let arr=DB.loans.slice().sort((a,b)=>new Date(a.dataVencimento)-new Date(b.dataVencimento));
  if(loanFilter==='ativos')arr=arr.filter(l=>l.status!=='quitado');
  else if(loanFilter==='quitado')arr=arr.filter(l=>l.status==='quitado');
  else if(loanFilter==='vencido')arr=arr.filter(l=>loanStatus(l).k==='vencido');
  else if(loanFilter==='proximo')arr=arr.filter(l=>['hoje','amanha','proximo'].includes(loanStatus(l).k));
  const q=loanSearch.toLowerCase().trim();
  if(q)arr=arr.filter(l=>{const c=clientById(l.clientId);return (c&&c.nome.toLowerCase().includes(q))||String(l.valorOriginal).includes(q)||String(l.saldo).includes(q);});
  const el=$('#loan-list');
  if(!arr.length){el.innerHTML=`<div class="empty">${ico('cash')}<div class="t">Nenhum empréstimo</div><div class="s">Toque em + para registrar.</div></div>`;return;}
  el.innerHTML=`<div class="list">${arr.map(loanRow).join('')}</div>`;
}
function loanRow(l){
  const c=clientById(l.clientId);const st=loanStatus(l);
  return `<div class="row" onclick="openLoanDetail('${l.id}')">
    <div class="avatar" ${c&&c.foto?`style="background-image:url('${c.foto}')"`:''}>${c&&!c.foto?initials(c.nome):''}</div>
    <div class="meta">
      <div class="nm">${c?c.nome:'(cliente removido)'}</div>
      <div class="sub"><span>Vence ${dBR(l.dataVencimento)}</span>${l.status!=='quitado'?`<span class="num">juros ${money(loanInterest(l))}</span>`:''}</div>
    </div>
    <div class="right">
      <div class="amt num">${money(l.status==='quitado'?l.valorOriginal:loanTotal(l))}</div>
      <div style="margin-top:5px"><span class="badge ${st.cls}">${st.txt}</span></div>
    </div>
  </div>`;
}

  sheet('Novo empréstimo',`

      <div><label class="si-l">Cliente</label><select class="input" id="f-cli">${opts}</select></div>
      <div class="form-grid two">
        <div><label class="si-l">Valor (R$)</label><input class="input num" id="f-val" inputmode="numeric" placeholder="0,00" oninput="maskMoney(this)"></div>
        <div><label class="si-l">Juros (% mês)</label><input class="input num" id="f-jur" inputmode="decimal" value="${taxaPara(firstCli)}"></div>
      </div>
      <div class="form-grid two">
        <div><label class="si-l">Data empréstimo</label><input class="input" id="f-emp" type="date" value="${todayISO()}"></div>

    $('#f-calc').innerHTML=`<div class="calc-line"><span class="k">Valor emprestado</span><span class="v num">${money(v)}</span></div>
      <div class="calc-line"><span class="k">Juros do mês (${j||0}%)</span><span class="v num">${money(jm)}</span></div>
      <div class="calc-line total"><span class="k">Total se quitar 1º mês</span><span class="v num">${money(v+jm)}</span></div>`;};

  $('#f-val').addEventListener('input',upd);$('#f-jur').addEventListener('input',upd);
  $('#f-emp').addEventListener('change',()=>{$('#f-ven').value=addMonth($('#f-emp').value);});

function parseNum(s){if(!s)return 0;return parseFloat(String(s).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''))||0;}
function fmtInput(n){return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function maskMoney(el){let v=el.value.replace(/\D/g,'');if(!v){el.value='';return;}el.value=(parseInt(v,10)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function saveLoan(){
  const clientId=$('#f-cli').value,val=parseNum($('#f-val').value),jur=parseNum($('#f-jur').value);

    status:'ativo',criadoPor:CURRENT.u,criadoEm:Date.now(),historico:[]};

  closeSheet();go('loans');toast('Empréstimo registrado');

}

let payReceipt='';
function openPayment(id){
  const l=DB.loans.find(x=>x.id===id);if(!l)return;payReceipt='';
  const juros=loanInterest(l);
  sheet('Registrar pagamento',`
    <div class="calc-box">
      <div class="calc-line"><span class="k">Saldo devedor</span><span class="v num">${money(l.saldo)}</span></div>
      <div class="calc-line"><span class="k">Juros do período</span><span class="v num">${money(juros)}</span></div>
    </div>
    <label class="si-l" style="margin-top:6px">Tipo de pagamento</label>
    <div class="opt-list" id="pay-opts">
      <div class="opt on" data-t="juros" onclick="selPay(this,'${id}')"><div class="rd"></div><div><div class="ot">Só os juros</div><div class="od">Saldo permanece. Renova o vencimento.</div></div></div>
      <div class="opt" data-t="misto" onclick="selPay(this,'${id}')"><div class="rd"></div><div><div class="ot">Juros + abater principal</div><div class="od">Quita os juros e o que sobrar reduz o saldo.</div></div></div>
      <div class="opt" data-t="principal" onclick="selPay(this,'${id}')"><div class="rd"></div><div><div class="ot">Somente abater principal</div><div class="od">Todo o valor reduz o saldo devedor.</div></div></div>
      <div class="opt" data-t="quitacao" onclick="selPay(this,'${id}')"><div class="rd"></div><div><div class="ot">Quitação total</div><div class="od">Saldo + juros. Encerra o empréstimo.</div></div></div>
    </div>
    <div class="form-grid two" style="margin-top:4px">
      <div><label class="si-l">Valor recebido</label><input class="input num" id="p-val" inputmode="numeric" value="${fmtInput(juros)}" oninput="maskMoney(this)"></div>
      <div><label class="si-l">Data</label><input class="input" id="p-data" type="date" value="${todayISO()}"></div>
    </div>
    <div class="toggle-row" id="p-renew-row"><div><div class="si-l">Renovar vencimento (+1 mês)</div></div><div class="switch on" id="p-renew" onclick="this.classList.toggle('on')"></div></div>
    <div class="calc-box" id="p-preview"></div>
    <label class="btn sec" style="margin-top:4px"><input type="file" accept="image/*" capture="environment" style="display:none" onchange="loadReceipt(this)">${ico('cam')} Anexar comprovante</label>
    <div id="p-rec-prev"></div>
    <button class="btn" style="margin-top:12px" onclick="savePayment('${id}')">Confirmar pagamento</button>
  `);
  payTipo='juros';updatePayPreview(id);
  $('#p-val').addEventListener('input',()=>updatePayPreview(id));
}
let payTipo='juros';
function selPay(el,id){document.querySelectorAll('#pay-opts .opt').forEach(o=>o.classList.remove('on'));el.classList.add('on');payTipo=el.dataset.t;
  const l=DB.loans.find(x=>x.id===id);const juros=loanInterest(l);
  if(payTipo==='juros'){$('#p-val').value=fmtInput(juros);}
  else if(payTipo==='quitacao'){$('#p-val').value=fmtInput(loanTotal(l));}
  $('#p-renew-row').style.display=payTipo==='quitacao'?'none':'flex';
  updatePayPreview(id);
}
function updatePayPreview(id){
  const l=DB.loans.find(x=>x.id===id);const juros=loanInterest(l);const val=parseNum($('#p-val').value);
  let jurosPago=0,principalPago=0,novoSaldo=l.saldo;
  if(payTipo==='juros'){jurosPago=val;}
  else if(payTipo==='misto'){jurosPago=Math.min(val,juros);principalPago=Math.max(0,val-juros);novoSaldo=Math.max(0,l.saldo-principalPago);}
  else if(payTipo==='principal'){principalPago=val;novoSaldo=Math.max(0,l.saldo-val);}
  else if(payTipo==='quitacao'){jurosPago=juros;principalPago=l.saldo;novoSaldo=0;}
  const novoJuros=Math.round(novoSaldo*(l.juros/100)*100)/100;
  $('#p-preview').innerHTML=`
    ${jurosPago?`<div class="calc-line"><span class="k">→ Juros pagos</span><span class="v num">${money(jurosPago)}</span></div>`:''}
    ${principalPago?`<div class="calc-line"><span class="k">→ Abatido do principal</span><span class="v num">${money(principalPago)}</span></div>`:''}
    <div class="calc-line"><span class="k">Novo saldo</span><span class="v num">${money(novoSaldo)}</span></div>
    <div class="calc-line total"><span class="k">${novoSaldo>0?'Próximos juros':'Empréstimo encerrado'}</span><span class="v num">${novoSaldo>0?money(novoJuros):'✓'}</span></div>`;
}
function loadReceipt(inp){const f=inp.files[0];if(!f)return;compressImg(f,1000,r=>{payReceipt=r;$('#p-rec-prev').innerHTML=`<img class="receipt" src="${r}" style="max-width:140px;margin-top:8px">`;});}
function savePayment(id){
  const l=DB.loans.find(x=>x.id===id);const juros=loanInterest(l);const val=parseNum($('#p-val').value);
  if(val<=0){toast('Informe o valor');return;}
  let jurosPago=0,principalPago=0,novoSaldo=l.saldo,tipo=payTipo;
  if(payTipo==='juros'){jurosPago=val;}
  else if(payTipo==='misto'){jurosPago=Math.min(val,juros);principalPago=Math.max(0,val-juros);novoSaldo=Math.max(0,l.saldo-principalPago);}
  else if(payTipo==='principal'){principalPago=val;novoSaldo=Math.max(0,l.saldo-val);}
  else if(payTipo==='quitacao'){jurosPago=juros;principalPago=l.saldo;novoSaldo=0;}
  const saldoAnterior=l.saldo,jurosAnterior=juros;
  l.saldo=Math.round(novoSaldo*100)/100;
  const renew=$('#p-renew')&&$('#p-renew').classList.contains('on');
  if(payTipo!=='quitacao'&&renew&&l.saldo>0)l.dataVencimento=addMonth(l.dataVencimento);
  if(l.saldo<=0){l.status='quitado';}
  const h={id:uid(),ts:Date.now(),data:$('#p-data').value,valor:val,tipo,jurosPago,principalPago,
    saldoAnterior,saldoAtual:l.saldo,jurosAnterior,novoJuros:loanInterest(l),user:CURRENT.u,comprovante:payReceipt};
  l.historico=l.historico||[];l.historico.push(h);
  audit('pagamento',`${clientById(l.clientId).nome} · ${money(val)} (${tipo})`);save();
  closeSheet();go(TAB==='dash'?'dash':'loans');toast(l.status==='quitado'?'Empréstimo quitado! 🎉':'Pagamento registrado');
  setTimeout(()=>openReceipt(l.id,h),350);
}
function delPayment(loanId,hId){
  confirmDialog('Excluir lançamento?','Esta ação remove o registro do histórico, mas não recalcula saldos anteriores automaticamente.',()=>{
    const l=DB.loans.find(x=>x.id===loanId);l.historico=l.historico.filter(h=>h.id!==hId);
    audit('pagamento_excluído',clientById(l.clientId)?.nome||'');save();closeSheet();toast('Lançamento excluído');
  });
}
function openLoanEdit(id){

function saveLoanEdit(id){

function delLoan(id){

let calMonth=new Date().getMonth(),calYear=new Date().getFullYear();
/* Projeta os vencimentos mensais: um empréstimo ativo "vence" no seu dia a cada mês,
   a partir da data de vencimento atual, mesmo que ainda não tenha sido pago/rolado. */
function loanDueOn(l,iso){
  if(l.status==='quitado'||iso<l.dataVencimento)return false;
  for(let k=0;k<60;k++){const d=addMonth(l.dataVencimento,k);if(d===iso)return true;if(d>iso)return false;}
  return false;
}
function renderAgenda(){
  $('#view').innerHTML=`<div class="page">
    <div class="panel"><div id="cal"></div></div>
    <div class="section-label">Cobranças do dia</div>
    <div id="agenda-list"></div>
  </div>`;
  drawCal();drawAgendaList(todayISO());
}
function drawCal(){
  const first=new Date(calYear,calMonth,1);const startDow=first.getDay();const days=new Date(calYear,calMonth+1,0).getDate();
  const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const ativos=DB.loans.filter(l=>l.status!=='quitado');
  let cells='';
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=startDow-1;i>=0;i--)cells+=`<div class="cal-d out">${prevDays-i}</div>`;
  for(let d=1;d<=days;d++){
    const iso=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===todayISO();
    const matches=ativos.filter(l=>loanDueOn(l,iso));
    let col='';if(matches.length){const realOverdue=matches.some(l=>l.dataVencimento===iso&&loanStatus(l).k==='vencido');col=realOverdue?'var(--bad)':'var(--warn)';}
    cells+=`<div class="cal-d ${isToday?'today':''}" onclick="drawAgendaList('${iso}')">${d}${matches.length?`<span class="cdot" style="background:${col}"></span>`:''}</div>`;
  }
  $('#cal').innerHTML=`
    <div class="cal-nav">
      <button class="icon-btn" onclick="calMove(-1)">${ico('back')}</button>
      <span class="m">${mn[calMonth]} ${calYear}</span>
      <button class="icon-btn" style="transform:rotate(180deg)" onclick="calMove(1)">${ico('back')}</button>
    </div>
    <div class="cal-grid">${['D','S','T','Q','Q','S','S'].map(h=>`<div class="cal-h">${h}</div>`).join('')}${cells}</div>`;
}
function calMove(n){calMonth+=n;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}drawCal();}
function agendaProjRow(l,iso){
  const c=clientById(l.clientId);
  return `<div class="row" onclick="openLoanDetail('${l.id}')">
    <div class="avatar" ${c&&c.foto?`style="background-image:url('${c.foto}')"`:''}>${c&&!c.foto?initials(c.nome):''}</div>
    <div class="meta"><div class="nm">${c?c.nome:'—'}</div>
      <div class="sub"><span>Ciclo ${dBR(iso)}</span><span class="num">saldo ${money(l.saldo)}</span></div></div>
    <div class="right"><div class="amt num">${money(loanInterest(l))}</div>
      <div style="margin-top:5px"><span class="badge warn">Previsto</span></div></div>
  </div>`;
}
function drawAgendaList(iso){
  const arr=DB.loans.filter(l=>loanDueOn(l,iso));
  const el=$('#agenda-list');
  const lbl=iso===todayISO()?'Hoje':dBR(iso);
  if(!arr.length){el.innerHTML=`<div class="empty"><div class="t">${lbl}</div><div class="s">Nenhuma cobrança nesta data.</div></div>`;return;}
  const reais=arr.filter(l=>l.dataVencimento===iso);
  const prev=arr.filter(l=>l.dataVencimento!==iso);
  let html=`<div class="help" style="margin-bottom:8px">${lbl} · ${arr.length} cobrança(s)</div>`;
  if(reais.length)html+=`<div class="list">${reais.map(loanRow).join('')}</div>`;
  if(prev.length)html+=`<div class="section-label" style="margin-top:14px">Ciclo previsto · juros do mês</div><div class="list">${prev.map(l=>agendaProjRow(l,iso)).join('')}</div>`;
  el.innerHTML=html;
}

function fillMsg(tpl,l,h){const c=clientById(l.clientId)||{nome:''};const at=Math.max(0,-daysBetween(todayISO(),l.dataVencimento));
  let out=tpl.replace(/{cliente}/g,c.nome).replace(/{valor}/g,money(l.valorOriginal)).replace(/{saldo}/g,money(l.saldo))
    .replace(/{juros}/g,money(loanInterest(l))).replace(/{total}/g,money(loanTotal(l)))
    .replace(/{data_emp}/g,dBR(l.dataEmprestimo)).replace(/{data_venc}/g,dBR(l.dataVencimento)).replace(/{dias_atraso}/g,at)
    .replace(/{pix}/g,DB.config.pix||'(não informada)');
  if(h){out=out.replace(/{valor_pago}/g,money(h.valor)).replace(/{juros_pago}/g,money(h.jurosPago||0))
    .replace(/{principal_pago}/g,money(h.principalPago||0)).replace(/{novo_saldo}/g,money(h.saldoAtual)).replace(/{data_pgto}/g,dBR(h.data));}
  else{out=out.replace(/{valor_pago}/g,'').replace(/{juros_pago}/g,'').replace(/{principal_pago}/g,'').replace(/{novo_saldo}/g,money(l.saldo)).replace(/{data_pgto}/g,dBR(todayISO()));}
  if(!noPix && DB.config.pix && !/\{pix\}/.test(tpl) && !out.includes(DB.config.pix)){out+=`\n\nChave PIX: ${DB.config.pix}`+(DB.config.pixNome?` (${DB.config.pixNome})`:'');}
  return out;}

/* ---- comprovante em imagem / PDF (sem PIX) ---- */
let RECEIPT=null;
function drawReceiptCanvas(l,h){
  const c=clientById(l.clientId)||{nome:'—'};
  const rows=[['Cliente',c.nome],['Data do pagamento',dBR(h.data)],['Valor recebido',money(h.valor)]];
  if(h.jurosPago)rows.push(['Juros pagos',money(h.jurosPago)]);
  if(h.principalPago)rows.push(['Abatido do principal',money(h.principalPago)]);
  rows.push(['Saldo anterior',money(h.saldoAnterior)]);
  const quit=l.status==='quitado'&&h.saldoAtual<=0;
  rows.push([quit?'Saldo devedor':'Novo saldo devedor',money(h.saldoAtual)]);
  if(!quit)rows.push(['Próximo vencimento',dBR(l.dataVencimento)]);
  const W=760,pad=52,headerH=150,rowH=62,footerH=96,SC=2;
  const H=headerH+rows.length*rowH+footerH;
  const cv=document.createElement('canvas');cv.width=W*SC;cv.height=H*SC;
  const x=cv.getContext('2d');x.scale(SC,SC);
  const F=(w,s)=>`${w} ${s}px -apple-system,Segoe UI,Roboto,Arial,sans-serif`;
  x.fillStyle='#ffffff';x.fillRect(0,0,W,H);
  // header
  x.fillStyle='#147a4c';x.fillRect(0,0,W,headerH);
  x.fillStyle='#eafff4';x.font=F(700,16);x.fillText('COMPROVANTE DE PAGAMENTO',pad,58);
  x.fillStyle='#ffffff';x.font=F(800,34);x.fillText(DB.config.credor||'Controle+',pad,98);
  x.fillStyle='#cdeedd';x.font=F(400,16);x.fillText('Emitido em '+dBR(todayISO()),pad,126);
  if(quit){x.fillStyle='#eafff4';x.font=F(800,18);x.textAlign='right';x.fillText('✓ QUITADO',W-pad,98);x.textAlign='left';}
  // rows
  let y=headerH+46;
  rows.forEach(([k,v],i)=>{
    const hl=(k.indexOf('Novo saldo')===0)||(k==='Valor recebido');
    x.fillStyle='#5b7065';x.font=F(400,18);x.textAlign='left';x.fillText(k,pad,y);
    x.fillStyle=hl?'#147a4c':'#16241c';x.font=F(hl?800:700,hl?22:20);x.textAlign='right';x.fillText(v,W-pad,y);
    x.textAlign='left';x.strokeStyle='#e6ede8';x.lineWidth=1;x.beginPath();x.moveTo(pad,y+22);x.lineTo(W-pad,y+22);x.stroke();
    y+=rowH;
  });
  // footer
  x.fillStyle='#8aa093';x.font=F(400,14);
  x.fillText('Documento gerado automaticamente pelo Controle+',pad,H-40);
  return cv;
}

  if(tipo==='carteira'){titulo='Carteira Ativa';head=['Cliente','Emprést.','Venc.','Saldo','Juros','Total','Situação'];
    const arr=DB.loans.filter(l=>l.status!=='quitado').sort((a,b)=>new Date(a.dataVencimento)-new Date(b.dataVencimento));
    rows=arr.map(l=>{const c=clientById(l.clientId);const st=loanStatus(l);return [c?c.nome:'—',dBR(l.dataEmprestimo),dBR(l.dataVencimento),money(l.saldo),money(loanInterest(l)),money(loanTotal(l)),st.txt];});
    totalCol=['Total a receber',arr.reduce((s,l)=>s+loanTotal(l),0)];
  }else if(tipo==='vencidos'){titulo='Empréstimos Vencidos';head=['Cliente','Vencimento','Atraso','Saldo','Total devido'];
    const arr=DB.loans.filter(l=>loanStatus(l).k==='vencido').sort((a,b)=>new Date(a.dataVencimento)-new Date(b.dataVencimento));
    rows=arr.map(l=>{const c=clientById(l.clientId);const st=loanStatus(l);return [c?c.nome:'—',dBR(l.dataVencimento),(st.atraso||0)+' dias',money(l.saldo),money(loanTotal(l))];});
    totalCol=['Total inadimplente',arr.reduce((s,l)=>s+loanTotal(l),0)];
  }else{titulo='Recebimentos';head=['Data','Cliente','Tipo','Valor','Juros'];
    const arr=[];DB.loans.forEach(l=>(l.historico||[]).forEach(h=>arr.push({h,l})));arr.sort((a,b)=>new Date(b.h.data)-new Date(a.h.data));
    rows=arr.map(({h,l})=>{const c=clientById(l.clientId);return [dBR(h.data),c?c.nome:'—',h.tipo,money(h.valor),money(h.jurosPago||0)];});
    totalCol=['Total recebido',arr.reduce((s,x)=>s+x.h.valor,0)];
  }
  return {titulo,head,rows,totalCol,credor,hoje};
}
function report(tipo){
  const r=buildReport(tipo);
  const tbl=`<table class="rep-tbl"><thead><tr>${r.head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${
    r.rows.length?r.rows.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')
    :`<tr><td colspan="${r.head.length}" class="rep-empty">Sem registros</td></tr>`}</tbody></table>
    ${r.totalCol?`<div class="rep-tot">${r.totalCol[0]}: ${money(r.totalCol[1])}</div>`:''}`;
  sheet(r.titulo,`
    <div class="help" style="margin-bottom:10px">${r.credor} · ${r.hoje} · ${r.rows.length} registro(s)</div>
    <div class="det-actions">
      <button class="btn" onclick="printReport('${tipo}')">${ico('doc')} Imprimir / Salvar PDF</button>
      <button class="btn sec" onclick="exportCSV('${tipo}')">${ico('sheet')} Planilha</button>
    </div>
    ${tbl}`);
}
function printReport(tipo){
  const r=buildReport(tipo);
  document.getElementById('print-area').innerHTML=`
    <h1>${r.titulo}</h1><div class="ps">${r.credor} · emitido em ${r.hoje} · ${r.rows.length} registro(s)</div>
    <table><thead><tr>${r.head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${
      r.rows.length?r.rows.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')
      :`<tr><td colspan="${r.head.length}" style="text-align:center;padding:20px">Sem registros</td></tr>`}</tbody></table>
    ${r.totalCol?`<div class="rep-tot">${r.totalCol[0]}: ${money(r.totalCol[1])}</div>`:''}
    <div class="pf">Gerado pelo Controle+ · documento gerencial · uso interno</div>`;
  document.body.classList.add('printing');
  try{window.print();}catch(e){toast('Use o menu do navegador para imprimir');}
  setTimeout(()=>{document.body.classList.remove('printing');document.getElementById('print-area').innerHTML='';},500);
}
function exportCSV(tipo){
  let head,lines;
  if(tipo){const r=buildReport(tipo);head=r.head;lines=[head.join(';'),...r.rows.map(row=>row.map(c=>String(c).replace(/;/g,',')).join(';'))];var fname=`${tipo}_${todayISO()}.csv`;}
  else{head=['Cliente','Telefone','Valor original','Saldo','Juros %','Juros R$','Total','Data emprestimo','Vencimento','Status'];lines=[head.join(';')];
    DB.loans.forEach(l=>{const c=clientById(l.clientId)||{};lines.push([(c.nome||'').replace(/;/g,','),(c.tel||''),l.valorOriginal.toFixed(2).replace('.',','),l.saldo.toFixed(2).replace('.',','),l.juros,loanInterest(l).toFixed(2).replace('.',','),loanTotal(l).toFixed(2).replace('.',','),dBR(l.dataEmprestimo),dBR(l.dataVencimento),l.status].join(';'));});
    var fname=`carteira_${todayISO()}.csv`;}
  safeDownload('\ufeff'+lines.join('\n'),fname,'text/csv;charset=utf-8','Planilha (CSV/Excel)');
}

/* ---- usuários ---- */
function openUsers(){
  sheet('Usuários e acessos',`
    <div class="list" style="margin-bottom:14px">${DB.users.map(u=>`
      <div class="row"><div class="avatar">${initials(u.nome||u.u)}</div>
        <div class="meta"><div class="nm">${u.nome||u.u}</div><div class="sub"><span>@${u.u}</span><span class="badge ${u.role==='admin'?'ok':'mut'}">${u.role==='admin'?'Administrador':'Operador'}</span></div></div>
        ${u.u!==CURRENT.u?`<button class="icon-btn" onclick="delUser('${u.u}')">${ico('trash')}</button>`:''}
      </div>`).join('')}</div>
    <div class="section-label">Novo usuário</div>
    <div class="form-grid">
      <div class="form-grid two"><div><label class="si-l">Nome</label><input class="input" id="u-nome"></div><div><label class="si-l">Usuário</label><input class="input" id="u-user"></div></div>
      <div class="form-grid two"><div><label class="si-l">Senha</label><input class="input" id="u-pass" type="password"></div>
      <div><label class="si-l">Perfil</label><select class="input" id="u-role"><option value="operador">Operador</option><option value="admin">Administrador</option></select></div></div>
      <button class="btn" onclick="addUser()">Adicionar usuário</button>
      <div class="help">Operador registra clientes e pagamentos. Administrador também gerencia usuários, configurações e backup.</div>
    </div>`);
}
function addUser(){
  const u=$('#u-user').value.trim().toLowerCase(),p=$('#u-pass').value,nome=$('#u-nome').value.trim();
  if(!u||!p){toast('Preencha usuário e senha');return;}
  if(DB.users.some(x=>x.u===u)){toast('Usuário já existe');return;}
  DB.users.push({u,p:hash(p),nome:nome||u,role:$('#u-role').value});audit('usuário_criado',u);save();openUsers();toast('Usuário adicionado');
}
function delUser(u){confirmDialog('Remover usuário?',`@${u} perderá o acesso.`,()=>{DB.users=DB.users.filter(x=>x.u!==u);audit('usuário_removido',u);save();openUsers();toast('Usuário removido');});}

/* ---- auditoria ---- */
function openAudit(){
  const a=DB.audit.slice(0,200);
  sheet('Trilha de auditoria',`<div class="tl">${a.length?a.map(x=>`
    <div class="tl-item"><div class="th"><span class="tt">${x.acao.replace(/_/g,' ')}</span><span class="td">${new Date(x.ts).toLocaleString('pt-BR')}</span></div>
    <div class="ts">${x.detalhe||''} · @${x.user}</div></div>`).join(''):'<div class="help">Sem registros.</div>'}</div>`);
}

/* ---- backup ---- */
function backupExport(){safeDownload(JSON.stringify(DB,null,2),`controle-mais_backup_${todayISO()}.json`,'application/json','Backup');audit('backup_exportado','');save();}
function backupImport(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.users||!d.loans){throw 0;}confirmDialog('Restaurar backup?','Os dados atuais serão substituídos pelos do arquivo.',()=>{DB=d;DB.session=CURRENT.u;save();toast('Backup restaurado');go('dash');});}catch(e){toast('Arquivo inválido');}};r.readAsText(f);}

/* ============================================================
   UI UTIL · sheets, modais, fab, imagens
   ============================================================ */
function sheet(title,html){
  $('#modal-root').innerHTML=`<div class="scrim" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><div class="grab"></div>
      <div class="sheet-head"><h3>${title}</h3><button class="icon-btn" onclick="closeSheet()">${ico('close')}</button></div>
      <div class="sheet-body">${html}</div></div></div>`;
  document.body.style.overflow='hidden';
}
function closeSheet(){$('#modal-root').innerHTML='';document.body.style.overflow='';}
function confirmDialog(title,msg,onYes){
  $('#modal-root').innerHTML=`<div class="scrim"><div class="sheet" style="max-width:380px">
    <div class="sheet-body" style="text-align:center;padding:24px">
      <h3 style="margin:0 0 8px;font-size:18px">${title}</h3>
      <p style="color:var(--ink2);font-size:14px;margin:0 0 20px">${msg}</p>
      <div style="display:flex;gap:10px"><button class="btn sec" onclick="closeSheet()">Cancelar</button><button class="btn danger" id="cd-yes">Confirmar</button></div>
    </div></div></div>`;
  document.body.style.overflow='hidden';
  $('#cd-yes').onclick=()=>{onYes();};
}
function mountFab(fn){const old=$('#fab');if(old)old.remove();if(!fn)return;const b=document.createElement('button');b.id='fab';b.className='fab';b.innerHTML=ico('plus');b.onclick=fn;document.body.appendChild(b);}
function viewImg(src){$('#modal-root').innerHTML=`<div class="scrim" onclick="closeSheet()"><img src="${src}" style="max-width:92vw;max-height:88vh;border-radius:14px"></div>`;}
function compressImg(file,max,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max}else if(h>max){w=w*max/h;h=max}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cb(cv.toDataURL('image/jpeg',0.8));};img.src=e.target.result;};r.readAsDataURL(file);}
function safeDownload(text,name,mime,label){
  try{
    const blob=new Blob([text],{type:mime});const u=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),1500);toast((label||'Arquivo')+' gerada');
  }catch(e){
    sheet(label||'Conteúdo',`<div class="help" style="margin-bottom:8px">Copie o conteúdo abaixo e salve em um arquivo .${name.split('.').pop()}:</div>
      <textarea class="input" style="min-height:200px;font-family:var(--mono);font-size:11px">${text.replace(/</g,'&lt;')}</textarea>
      <button class="btn" style="margin-top:10px" onclick="navigator.clipboard.writeText(this.previousElementSibling.value);toast('Copiado')">Copiar tudo</button>`);
  }
}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000);}
